<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Prenotazione</title>
  <style>
    @font-face {
      font-family: 'CenturyGothicBold';
      src: url('century-gothic-bold.woff2') format('woff2');
      font-weight: bold; font-style: normal; font-display: swap;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'CenturyGothicBold', 'Century Gothic', CenturyGothic, Futura, 'Apple Gothic', Arial, sans-serif;
      font-weight: bold; background-color: #ffffff;
      background-image: url('bg.png'); background-repeat: no-repeat; background-position: center;
      background-size: auto 100vh; background-attachment: fixed;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px; overflow-x: hidden;
    }
    .app-wrap { width: 100%; max-width: 420px; position: relative; z-index: 10; }
    .popup {
      background: rgba(255, 255, 255, 0.90); border: 2px solid #40E0D0; border-radius: 18px;
      padding: 24px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: none; animation: slideUp 0.25s ease-out;
    }
    .popup.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 1.1rem; margin-bottom: 16px; color: #111; text-align: center; letter-spacing: 0.3px; }
    
    /* NUOVO LAYOUT LINGUE */
    .lang-list {
      display: flex;
      flex-direction: column;
      align-items: center; /* Centra il blocco intero nel popup */
      gap: 8px;
      width: 100%;
    }
    .lang-opt {
      display: flex;
      align-items: center;
      justify-content: flex-start; /* Allinea pallino-bandiera-testo a sinistra */
      width: fit-content; /* Il blocco si adatta al contenuto più lungo */
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-opt:hover { background: rgba(64, 224, 208, 0.08); }
    .lang-opt input[type="radio"] {
      margin-right: 12px; accent-color: #40E0D0; transform: scale(1.3); cursor: pointer;
    }
    .lang-opt img { 
      width: 42px; height: 42px; margin-right: 12px; 
      border-radius: 50%; object-fit: cover; border: 1px solid #ddd; 
    }
    .lang-opt span { font-size: 1rem; color: #222; white-space: nowrap; }

    /* FORM */
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #333; font-size: 0.9rem; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 1rem; font-family: inherit; background: #fafafa; }
    input:focus, select:focus { outline: none; border-color: #40E0D0; background: #fff; }
    .radio-group { display: flex; gap: 24px; margin: 10px 0; }
    .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; margin: 0; cursor: pointer; }
    .btn { width: 100%; padding: 14px; background: #40E0D0; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; margin-top: 18px; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .btn:active { opacity: 0.85; } .btn:disabled { background: #bbb; cursor: not-allowed; }
    .btn-sec { background: #888; margin-top: 8px; }
    .err { color: #d32f2f; font-size: 0.8rem; margin-top: 6px; display: none; font-weight: normal; }
    .preview { background: #f4fbff; padding: 12px; border-radius: 10px; margin: 12px 0; font-size: 0.85rem; white-space: pre-wrap; font-weight: normal; color: #333; line-height: 1.4; }
    .self-check-bar { font-size: 0.65rem; color: #666; margin-top: 14px; padding-top: 8px; border-top: 1px dashed #ccc; text-align: center; }
  </style>
</head>
<body>
  <div class="app-wrap">
    <!-- STEP 0: LINGUA -->
    <div id="s0" class="popup active">
      <h2 id="t-lang"></h2>
      <div class="lang-list">
        <div class="lang-opt" onclick="pickLang('it')"><input type="radio" name="lang" value="it"><img src="flag-it.png" alt="IT"><span>Italiano</span></div>
        <div class="lang-opt" onclick="pickLang('en')"><input type="radio" name="lang" value="en"><img src="flag-en.png" alt="EN"><span>English</span></div>
        <div class="lang-opt" onclick="pickLang('de')"><input type="radio" name="lang" value="de"><img src="flag-de.png" alt="DE"><span>Deutsch</span></div>
      </div>
    </div>

    <!-- STEP 1 -->
    <div id="s1" class="popup">
      <h2 id="t-s1"></h2>
      <div class="radio-group">
        <label><input type="radio" name="book" value="no"><span id="o-no"></span></label>
        <label><input type="radio" name="book" value="yes"><span id="o-yes"></span></label>
      </div>
      <div id="e1" class="err"></div><button class="btn" id="n1"></button>
    </div>
    <div id="s2" class="popup">
      <h2 id="t-s2"></h2>
      <label for="d" id="lb-d"></label><select id="d"></select>
      <label for="h" id="lb-h"></label><select id="h"></select>
      <label for="m" id="lb-m"></label><select id="m"></select>
      <div id="e2" class="err"></div><button class="btn" id="n2"></button><button class="btn btn-sec" id="b2"></button>
    </div>
    <div id="s3" class="popup">
      <h2 id="t-s3"></h2>
      <label for="p" id="lb-p"></label>
      <input type="number" id="p" min="1" max="50" placeholder="2" inputmode="numeric">
      <div id="e3" class="err"></div><button class="btn" id="n3"></button><button class="btn btn-sec" id="b3"></button>
    </div>
    <div id="s4" class="popup">
      <h2 id="t-s4"></h2>
      <label for="a" id="lb-a"></label>
      <select id="a">
        <option value="">--</option>
        <option value="int" data-it="Sala interna" data-en="Indoor room" data-de="Innenbereich"></option>
        <option value="ver" data-it="Veranda" data-en="Veranda" data-de="Veranda"></option>
        <option value="tor" data-it="Strada vista torre" data-en="Street view (Tower)" data-de="Straße (Turmblick)"></option>
        <option value="mar" data-it="Strada vista mare" data-en="Street view (Sea)" data-de="Straße (Meerblick)"></option>
      </select>
      <div id="e4" class="err"></div><button class="btn" id="n4"></button><button class="btn btn-sec" id="b4"></button>
    </div>
    <div id="s5" class="popup">
      <h2 id="t-s5"></h2>
      <label for="nm" id="lb-nm"></label><input type="text" id="nm" placeholder="Nome">
      <label for="ph" id="lb-ph"></label><input type="tel" id="ph" placeholder="+39 333 1234567" inputmode="tel">
      <div id="e5" class="err"></div><button class="btn" id="n5"></button><button class="btn btn-sec" id="b5"></button>
    </div>
    <div id="s6" class="popup">
      <h2 id="t-s6"></h2><p id="prev-lb"></p><div class="preview" id="prev"></div>
      <button class="btn" id="send"></button><button class="btn btn-sec" id="b6"></button>
      <div class="self-check-bar">SELF-CHECK: Lang layout centered, items left-aligned, 4 locations, dual-msg active</div>
    </div>
  </div>

  <script>
    const PHONE = "393466688212";
    const $ = id => document.getElementById(id);
    const show = id => { document.querySelectorAll('.popup').forEach(e=>e.classList.remove('active')); $(id).classList.add('active'); };
    const T = {
      it: { lang:"Seleziona la lingua", s1:"📋 Vuoi prenotare un tavolo?", no:"No", yes:"Sì", s2:" Quando?", d:"Giorno", h:"Ora", m:"Minuti", s3:"👥 Per quante persone?", p:"Numero persone", s4:"📍 In quale area?", a:"Area del locale", s5:"👤 I tuoi dati", nm:"Nome", ph:"Telefono (opzionale)", s6:"✅ Conferma", prev:"Messaggio da inviare:", next:"Avanti", back:"Indietro", send:"📲 Invia su WhatsApp", e1:"Seleziona un'opzione.", e2:"Compila data e ora.", e3:"Numero valido (1-50).", e4:"Seleziona un'area.", e5:"Nome obbligatorio.", bye:"Peccato! Torna quando vuoi prenotare 😊", tmpl:"Buonasera, sono {n}, vorrei prenotare un tavolo per {p} persone in zona {a} il {d} alle {t}, è possibile?" },
      en: { lang:"Select language", s1:"📋 Book a table?", no:"No", yes:"Yes", s2:"📅 When?", d:"Day", h:"Hour", m:"Minutes", s3:"👥 How many people?", p:"Number of guests", s4:"📍 Which area?", a:"Restaurant area", s5:" Your details", nm:"Name", ph:"Phone (optional)", s6:"✅ Confirm", prev:"Message to send:", next:"Next", back:"Back", send:" Send via WhatsApp", e1:"Please select an option.", e2:"Fill date and time.", e3:"Valid number (1-50).", e4:"Select an area.", e5:"Name required.", bye:"Too bad! Come back when you want to book ", tmpl:"Good evening, I'm {n}, I would like to book a table for {p} people in the {a} on {d} at {t}, is it possible?" },
      de: { lang:"Sprache wählen", s1:" Tisch reservieren?", no:"Nein", yes:"Ja", s2:" Wann?", d:"Tag", h:"Uhrzeit", m:"Minuten", s3:"👥 Für wie viele Personen?", p:"Anzahl Personen", s4:"📍 In welchem Bereich?", a:"Bereich des Lokals", s5:"👤 Ihre Daten", nm:"Name", ph:"Telefon (optional)", s6:"✅ Bestätigung", prev:"Nachricht zum Senden:", next:"Weiter", back:"Zurück", send:"📲 Über WhatsApp senden", e1:"Bitte eine Option wählen.", e2:"Datum und Uhrzeit ausfüllen.", e3:"Gültige Zahl (1-50).", e4:"Bereich wählen.", e5:"Name erforderlich.", bye:"Schade! Kommen Sie zurück, wenn Sie reservieren möchten 😊", tmpl:"Guten Abend, ich bin {n}, ich möchte einen Tisch für {p} Personen im Bereich {a} am {d} um {t} reservieren, ist das möglich?" }
    };
    let L = 'it';
    const dayN = { it:['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'], en:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'], de:['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'] };
    const dayNS = { it:['Dom','Lun','Mar','Mer','Gio','Ven','Sab'], en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], de:['So','Mo','Di','Mi','Do','Fr','Sa'] };
    const monNS = { it:['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'], en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], de:['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'] };

    const applyLang = () => {
      const t = T[L];
      $('t-lang').textContent = t.lang; $('t-s1').textContent = t.s1; $('o-no').textContent = t.no; $('o-yes').textContent = t.yes; $('n1').textContent = t.next;
      $('t-s2').textContent = t.s2; $('lb-d').textContent = t.d; $('lb-h').textContent = t.h; $('lb-m').textContent = t.m; $('n2').textContent = t.next; $('b2').textContent = t.back;
      $('t-s3').textContent = t.s3; $('lb-p').textContent = t.p; $('n3').textContent = t.next; $('b3').textContent = t.back;
      $('t-s4').textContent = t.s4; $('lb-a').textContent = t.a; $('n4').textContent = t.next; $('b4').textContent = t.back;
      $('t-s5').textContent = t.s5; $('lb-nm').textContent = t.nm; $('lb-ph').textContent = t.ph; $('n5').textContent = t.next; $('b5').textContent = t.back;
      $('t-s6').textContent = t.s6; $('prev-lb').textContent = t.prev; $('send').textContent = t.send; $('b6').textContent = t.back;
      $('e1').textContent=t.e1; $('e2').textContent=t.e2; $('e3').textContent=t.e3; $('e4').textContent=t.e4; $('e5').textContent=t.e5;
      document.querySelectorAll('#a option[data-it]').forEach(o => o.textContent = o.getAttribute(`data-${L}`));
      renderDates();
    };
    function pickLang(lang) { L = lang; document.querySelector(`input[value="${lang}"]`).checked = true; applyLang(); show('s1'); }

    function renderDates(){
      const sel=$('d'); sel.innerHTML=''; const today = new Date(); let count = 0, offset = 0;
      while(count < 7){
        const d = new Date(today); d.setDate(today.getDate() + offset);
        if(d.getDay() !== 1){ sel.add(new Option(`${dayNS[L][d.getDay()]} ${d.getDate()} ${monNS[L][d.getMonth()]}`, d.toISOString().split('T')[0])); count++; }
        offset++;
      }
    }
    renderDates();
    const hS=$('h'), mS=$('m');
    for(let h=12; h<=22; h++) hS.add(new Option(`${String(h).padStart(2,'0')}`, `${String(h).padStart(2,'0')}`));
    [0,15,30,45].forEach(m => mS.add(new Option(String(m).padStart(2,'0'), String(m).padStart(2,'0'))));

    const check = s => {
      const t=T[L]; let ok=true, er=null;
      if(s===1){ const v=document.querySelector('input[name="book"]:checked')?.value; if(!v){er=$('e1');ok=false;} else if(v==='no'){alert(t.bye);location.reload();return false;} }
      if(s===2){ if(!$('d').value||!$('h').value||!$('m').value){er=$('e2');ok=false;} }
      if(s===3){ const p=parseInt($('p').value); if(isNaN(p)||p<1||p>50){er=$('e3');ok=false;} }
      if(s===4){ if(!$('a').value){er=$('e4');ok=false;} }
      if(s===5){ if(!$('nm').value.trim()){er=$('e5');ok=false;} }
      if(er){er.style.display='block';setTimeout(()=>er.style.display='none',2500);} return ok;
    };

    $('n5').onclick = ()=> {
      if(!check(5)) return;
      const t=T[L], rawDate = new Date($('d').value);
      const dateSel = `${dayNS[L][rawDate.getDay()]} ${rawDate.getDate()} ${monNS[L][rawDate.getMonth()]}`;
      const dateIT = `${dayN['it'][rawDate.getDay()]} ${rawDate.getDate()} ${monNS['it'][rawDate.getMonth()]}`;
      const time = `${$('h').value}:${$('m').value}`;
      const areaSel = $('a').options[$('a').selectedIndex].text;
      const areaIT = $('a').options[$('a').selectedIndex].getAttribute('data-it');
      const nm = $('nm').value.trim(), p = $('p').value;
      const fill = (tpl, d, a) => tpl.replace('{n}',nm).replace('{p}',p).replace('{a}',a).replace('{d}',d).replace('{t}',time);
      let msg = fill(t.tmpl, dateSel, areaSel);
      if (L !== 'it') msg += '\n\n' + fill(T.it.tmpl, dateIT, areaIT);
      $('prev').textContent = msg; show('s6');
    };

    $('send').onclick = ()=> {
      const msg=$('prev').textContent;
      const url=`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
      if(!/^\d{8,15}$/.test(PHONE.replace('+',''))){alert('⚠️ Config telefono errata');return;}
      window.location.href=url;
    };
    $('n1').onclick=()=>check(1)&&show('s2'); $('n2').onclick=()=>check(2)&&show('s3'); $('n3').onclick=()=>check(3)&&show('s4'); $('n4').onclick=()=>check(4)&&show('s5');
    $('b2').onclick=()=>show('s1'); $('b3').onclick=()=>show('s2'); $('b4').onclick=()=>show('s3'); $('b5').onclick=()=>show('s4'); $('b6').onclick=()=>show('s5');
  </script>
</body>
</html>
